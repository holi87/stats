openapi: 3.0.3
info:
  title: Game Stats API
  version: 1.0.0
  description: API kontrakty dla modułów 1v1 oraz multiplayer.
servers:
  - url: /api/v1

components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token

  schemas:
    Uuid:
      type: string
      format: uuid
      example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
    Date:
      type: string
      format: date
      example: "2026-01-30"
    DateTime:
      type: string
      format: date-time
      example: "2026-01-30T12:00:00.000Z"
    ErrorDetailsItem:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    ErrorPayload:
      type: object
      required: [code, message, details]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, NOT_FOUND, CONFLICT, FORBIDDEN, TOO_MANY_REQUESTS, INTERNAL_ERROR]
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetailsItem'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorPayload'

    MultiplayerGame:
      type: object
      required: [id, code, displayName, scoringType, minPlayers, maxPlayers, isActive, showInQuickMenu, optionsCount, requiresOption, optionsExclusive, customFieldsCount]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
          example: "terraforming_mars"
        displayName:
          type: string
          example: "Terraformacja Marsa"
        calculatorButtonLabel:
          type: string
          nullable: true
        calculatorUrl:
          type: string
          nullable: true
        scoringType:
          type: string
          enum: [MANUAL_POINTS, TTR_CALCULATOR, TM_CALCULATOR, CUSTOM_CALCULATOR]
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        isActive:
          type: boolean
        showInQuickMenu:
          type: boolean
        optionsCount:
          type: integer
        requiresOption:
          type: boolean
        optionsExclusive:
          type: boolean
        customFieldsCount:
          type: integer

    MultiplayerGameListItem:
      type: object
      required: [id, code, displayName, scoringType, minPlayers, maxPlayers, isActive, showInQuickMenu, optionsCount, requiresOption, optionsExclusive, customFieldsCount]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        displayName:
          type: string
        calculatorButtonLabel:
          type: string
          nullable: true
        calculatorUrl:
          type: string
          nullable: true
        scoringType:
          type: string
          enum: [MANUAL_POINTS, TTR_CALCULATOR, TM_CALCULATOR, CUSTOM_CALCULATOR]
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        isActive:
          type: boolean
        showInQuickMenu:
          type: boolean
        optionsCount:
          type: integer
        requiresOption:
          type: boolean
        optionsExclusive:
          type: boolean
        customFieldsCount:
          type: integer

    MultiplayerGameList:
      type: array
      items:
        $ref: '#/components/schemas/MultiplayerGameListItem'

    MultiplayerGameCreateInput:
      type: object
      required: [displayName]
      properties:
        code:
          type: string
        displayName:
          type: string
        calculatorButtonLabel:
          type: string
          nullable: true
          maxLength: 40
        calculatorUrl:
          type: string
          nullable: true
          maxLength: 400
        scoringType:
          type: string
          enum: [MANUAL_POINTS, CUSTOM_CALCULATOR]
        minPlayers:
          type: integer
        maxPlayers:
          type: integer
        showInQuickMenu:
          type: boolean
        isActive:
          type: boolean
        optionsExclusive:
          type: boolean
        customCalculator:
          type: object
          properties:
            fields:
              type: array
              items:
                type: object
                required: [label, pointsPerUnit]
                properties:
                  code:
                    type: string
                  label:
                    type: string
                  description:
                    type: string
                  pointsPerUnit:
                    type: integer

    MultiplayerGamePatchInput:
      type: object
      minProperties: 1
      properties:
        displayName:
          type: string
          maxLength: 80
        minPlayers:
          type: integer
          minimum: 1
        maxPlayers:
          type: integer
          minimum: 1
        showInQuickMenu:
          type: boolean
        isActive:
          type: boolean
        optionsExclusive:
          type: boolean
        calculatorButtonLabel:
          type: string
          nullable: true
          maxLength: 40
        calculatorUrl:
          type: string
          nullable: true
          maxLength: 400

    MultiplayerGameDeleteResponse:
      type: object
      required: [code, deletedMatches]
      properties:
        code:
          type: string
        deletedMatches:
          type: integer

    MultiplayerCustomCalculatorField:
      type: object
      required: [id, gameId, code, label, pointsPerUnit, sortOrder, isActive]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gameId:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        label:
          type: string
        description:
          type: string
          nullable: true
        pointsPerUnit:
          type: integer
        sortOrder:
          type: integer
        isActive:
          type: boolean

    MultiplayerMatchPlayer:
      type: object
      required: [playerId, name, totalPoints, place]
      properties:
        playerId:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        totalPoints:
          type: integer
        place:
          type: integer

    MultiplayerMatchListItem:
      type: object
      required: [id, playedOn, game, players]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        game:
          type: object
          required: [id, code, displayName]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            code:
              type: string
            displayName:
              type: string
        players:
          type: array
          items:
            $ref: '#/components/schemas/MultiplayerMatchPlayer'

    MultiplayerMatchListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MultiplayerMatchListItem'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TrainsCounts:
      type: object
      description: "Klucze '1'..'9' z wartościami integer >= 0"
      required: ['1','2','3','4','5','6','7','8','9']
      additionalProperties: false
      properties:
        '1': { type: integer, minimum: 0 }
        '2': { type: integer, minimum: 0 }
        '3': { type: integer, minimum: 0 }
        '4': { type: integer, minimum: 0 }
        '5': { type: integer, minimum: 0 }
        '6': { type: integer, minimum: 0 }
        '7': { type: integer, minimum: 0 }
        '8': { type: integer, minimum: 0 }
        '9': { type: integer, minimum: 0 }

    TicketToRideVariant:
      type: object
      required: [id, code, name]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
          example: "europe"
        name:
          type: string
          example: "Europa"

    TicketToRidePlayersDetails:
      type: array
      items:
        type: object
        required: [playerId, ticketsPoints, bonusPoints, trainsCounts, trainsPoints, totalPoints, place]
        properties:
          playerId:
            $ref: '#/components/schemas/Uuid'
          ticketsPoints:
            type: integer
          bonusPoints:
            type: integer
            minimum: 0
          trainsCounts:
            $ref: '#/components/schemas/TrainsCounts'
          trainsPoints:
            type: integer
            minimum: 0
          totalPoints:
            type: integer
          place:
            type: integer

    TerraformingMarsPlayersDetails:
      type: array
      items:
        type: object
        required:
          [playerId, titlesCount, awardsFirstCount, awardsSecondCount, citiesPoints, forestsPoints, cardsPoints, trPoints, titlesPoints, awardsFirstPoints, awardsSecondPoints, totalPoints, place]
        properties:
          playerId:
            $ref: '#/components/schemas/Uuid'
          titlesCount:
            type: integer
            minimum: 0
          awardsFirstCount:
            type: integer
            minimum: 0
          awardsSecondCount:
            type: integer
            minimum: 0
          citiesPoints:
            type: integer
            minimum: 0
          forestsPoints:
            type: integer
            minimum: 0
          cardsPoints:
            type: integer
            minimum: 0
          trPoints:
            type: integer
            minimum: 0
          titlesPoints:
            type: integer
            minimum: 0
          awardsFirstPoints:
            type: integer
            minimum: 0
          awardsSecondPoints:
            type: integer
            minimum: 0
          totalPoints:
            type: integer
          place:
            type: integer

    MultiplayerMatchBase:
      type: object
      required: [id, game, playedOn, players]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        game:
          $ref: '#/components/schemas/MultiplayerGame'
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        players:
          type: array
          items:
            $ref: '#/components/schemas/MultiplayerMatchPlayer'

    MultiplayerMatchManualResponse:
      allOf:
        - $ref: '#/components/schemas/MultiplayerMatchBase'

    MultiplayerMatchTtrResponse:
      allOf:
        - $ref: '#/components/schemas/MultiplayerMatchBase'
        - type: object
          required: [ticketToRide]
          properties:
            ticketToRide:
              type: object
              required: [variant, playersDetails]
              properties:
                variant:
                  $ref: '#/components/schemas/TicketToRideVariant'
                playersDetails:
                  $ref: '#/components/schemas/TicketToRidePlayersDetails'

    MultiplayerMatchTmResponse:
      allOf:
        - $ref: '#/components/schemas/MultiplayerMatchBase'
        - type: object
          required: [terraformingMars]
          properties:
            terraformingMars:
              type: object
              required: [playersDetails]
              properties:
                playersDetails:
                  $ref: '#/components/schemas/TerraformingMarsPlayersDetails'

    MultiplayerCustomCalculatorPlayersDetails:
      type: array
      items:
        type: object
        required: [playerId, values, totalPoints, place]
        properties:
          playerId:
            $ref: '#/components/schemas/Uuid'
          values:
            type: array
            items:
              type: object
              required: [fieldId, value, points]
              properties:
                fieldId:
                  $ref: '#/components/schemas/Uuid'
                value:
                  type: integer
                points:
                  type: integer
          totalPoints:
            type: integer
          place:
            type: integer

    MultiplayerMatchCustomResponse:
      allOf:
        - $ref: '#/components/schemas/MultiplayerMatchBase'
        - type: object
          required: [customCalculator]
          properties:
            customCalculator:
              type: object
              required: [fields, playersDetails]
              properties:
                fields:
                  type: array
                  items:
                    $ref: '#/components/schemas/MultiplayerCustomCalculatorField'
                playersDetails:
                  $ref: '#/components/schemas/MultiplayerCustomCalculatorPlayersDetails'

    MultiplayerMatchResponse:
      oneOf:
        - $ref: '#/components/schemas/MultiplayerMatchManualResponse'
        - $ref: '#/components/schemas/MultiplayerMatchTtrResponse'
        - $ref: '#/components/schemas/MultiplayerMatchTmResponse'
        - $ref: '#/components/schemas/MultiplayerMatchCustomResponse'

    MultiplayerMatchManualCreate:
      type: object
      description: "scoringType jest opcjonalne i służy jedynie do rozróżnienia schematów (serwer ignoruje to pole)."
      required: [gameId, playedOn, players]
      properties:
        scoringType:
          type: string
          enum: [MANUAL_POINTS]
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        players:
          type: array
          items:
            type: object
            required: [playerId, totalPoints]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              totalPoints:
                type: integer

    MultiplayerMatchTtrCreate:
      type: object
      description: "scoringType jest opcjonalne i służy jedynie do rozróżnienia schematów (serwer ignoruje to pole)."
      required: [gameId, playedOn, ticketToRide, players]
      properties:
        scoringType:
          type: string
          enum: [TTR_CALCULATOR]
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        ticketToRide:
          type: object
          required: [variantId]
          properties:
            variantId:
              $ref: '#/components/schemas/Uuid'
        players:
          type: array
          items:
            type: object
            required: [playerId, ticketsPoints, bonusPoints, trainsCounts]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              ticketsPoints:
                type: integer
              bonusPoints:
                type: integer
                minimum: 0
              trainsCounts:
                $ref: '#/components/schemas/TrainsCounts'

    MultiplayerMatchTmCreate:
      type: object
      description: "scoringType jest opcjonalne. Gdy FEATURE_SIMPLE_TM_MODE=true gracze podaja totalPoints; legacy kalkulator uzywa pol szczegolowych."
      required: [gameId, playedOn, players]
      properties:
        scoringType:
          type: string
          enum: [TM_CALCULATOR]
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        terraformingMars:
          type: object
          description: "Placeholder na przyszłość"
        players:
          type: array
          items:
            type: object
            required: [playerId]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              totalPoints:
                type: integer
              titlesCount:
                type: integer
                minimum: 0
                default: 0
              awardsFirstCount:
                type: integer
                minimum: 0
                default: 0
              awardsSecondCount:
                type: integer
                minimum: 0
                default: 0
              citiesPoints:
                type: integer
                minimum: 0
                default: 0
              forestsPoints:
                type: integer
                minimum: 0
                default: 0
              cardsPoints:
                type: integer
                minimum: 0
                default: 0
              trPoints:
                type: integer
                minimum: 0
                default: 0

    MultiplayerMatchCustomCreate:
      type: object
      description: "scoringType jest opcjonalne i służy jedynie do rozróżnienia schematów (serwer ignoruje to pole)."
      required: [gameId, playedOn, players]
      properties:
        scoringType:
          type: string
          enum: [CUSTOM_CALCULATOR]
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        players:
          type: array
          items:
            type: object
            required: [playerId, calculatorValues]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              calculatorValues:
                type: object
                additionalProperties:
                  type: integer

    MultiplayerMatchCreate:
      oneOf:
        - $ref: '#/components/schemas/MultiplayerMatchManualCreate'
        - $ref: '#/components/schemas/MultiplayerMatchTtrCreate'
        - $ref: '#/components/schemas/MultiplayerMatchTmCreate'
        - $ref: '#/components/schemas/MultiplayerMatchCustomCreate'
      discriminator:
        propertyName: scoringType
        mapping:
          MANUAL_POINTS: '#/components/schemas/MultiplayerMatchManualCreate'
          TTR_CALCULATOR: '#/components/schemas/MultiplayerMatchTtrCreate'
          TM_CALCULATOR: '#/components/schemas/MultiplayerMatchTmCreate'
          CUSTOM_CALCULATOR: '#/components/schemas/MultiplayerMatchCustomCreate'

    MultiplayerMatchManualPatch:
      type: object
      description: "Co najmniej jedno z: playedOn, notes, players. scoringType opcjonalne (jak wyżej)."
      properties:
        scoringType:
          type: string
          enum: [MANUAL_POINTS]
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        players:
          type: array
          items:
            type: object
            required: [playerId, totalPoints]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              totalPoints:
                type: integer

    MultiplayerMatchTtrPatch:
      type: object
      description: "Co najmniej jedno z: playedOn, notes, players. scoringType opcjonalne. ticketToRide można podać tylko razem z jednym z tych pól."
      properties:
        scoringType:
          type: string
          enum: [TTR_CALCULATOR]
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        ticketToRide:
          type: object
          required: [variantId]
          properties:
            variantId:
              $ref: '#/components/schemas/Uuid'
        players:
          type: array
          items:
            type: object
            required: [playerId, ticketsPoints, bonusPoints, trainsCounts]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              ticketsPoints:
                type: integer
              bonusPoints:
                type: integer
                minimum: 0
              trainsCounts:
                $ref: '#/components/schemas/TrainsCounts'

    MultiplayerMatchTmPatch:
      type: object
      description: "Co najmniej jedno z: playedOn, notes, players. Gdy FEATURE_SIMPLE_TM_MODE=true gracze podaja totalPoints; legacy kalkulator uzywa pol szczegolowych."
      properties:
        scoringType:
          type: string
          enum: [TM_CALCULATOR]
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        terraformingMars:
          type: object
        players:
          type: array
          items:
            type: object
            required: [playerId]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              totalPoints:
                type: integer
              titlesCount:
                type: integer
                minimum: 0
              awardsFirstCount:
                type: integer
                minimum: 0
              awardsSecondCount:
                type: integer
                minimum: 0
              citiesPoints:
                type: integer
                minimum: 0
              forestsPoints:
                type: integer
                minimum: 0
              cardsPoints:
                type: integer
                minimum: 0
              trPoints:
                type: integer
                minimum: 0

    MultiplayerMatchCustomPatch:
      type: object
      description: "Co najmniej jedno z: playedOn, notes, players. scoringType opcjonalne."
      properties:
        scoringType:
          type: string
          enum: [CUSTOM_CALCULATOR]
        playedOn:
          $ref: '#/components/schemas/Date'
        notes:
          type: string
          nullable: true
          maxLength: 2000
        players:
          type: array
          items:
            type: object
            required: [playerId, calculatorValues]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              calculatorValues:
                type: object
                additionalProperties:
                  type: integer

    MultiplayerMatchPatch:
      oneOf:
        - $ref: '#/components/schemas/MultiplayerMatchManualPatch'
        - $ref: '#/components/schemas/MultiplayerMatchTtrPatch'
        - $ref: '#/components/schemas/MultiplayerMatchTmPatch'
        - $ref: '#/components/schemas/MultiplayerMatchCustomPatch'
      discriminator:
        propertyName: scoringType
        mapping:
          MANUAL_POINTS: '#/components/schemas/MultiplayerMatchManualPatch'
          TTR_CALCULATOR: '#/components/schemas/MultiplayerMatchTtrPatch'
          TM_CALCULATOR: '#/components/schemas/MultiplayerMatchTmPatch'
          CUSTOM_CALCULATOR: '#/components/schemas/MultiplayerMatchCustomPatch'

    MultiplayerPlayerStats:
      type: object
      required: [playerId, name, matches, wins, seconds, thirds, podiums, avgPoints, bestPoints]
      properties:
        playerId:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        matches:
          type: integer
        wins:
          type: integer
        seconds:
          type: integer
        thirds:
          type: integer
        podiums:
          type: integer
        avgPoints:
          type: number
          format: float
        bestPoints:
          type: integer

    MultiplayerGameOption:
      type: object
      required: [id, gameId, code, displayName, sortOrder, isActive]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        gameId:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        displayName:
          type: string
        sortOrder:
          type: integer
        isActive:
          type: boolean

    MultiplayerGameOptionCreateInput:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          maxLength: 80
        optionCode:
          type: string
          maxLength: 64
        sortOrder:
          type: integer

    MultiplayerGameOptionPatchInput:
      type: object
      minProperties: 1
      properties:
        displayName:
          type: string
          maxLength: 80

    AdminDataImportRequest:
      type: object
      required: [payload]
      properties:
        dryRun:
          type: boolean
          default: true
        payload:
          type: object
          additionalProperties: true
        confirmation:
          type: string

    AdminDataImportResponse:
      type: object
      required: [dryRun, summary, warnings]
      properties:
        dryRun:
          type: boolean
        summary:
          type: object
          required: [received, toInsert, toUpdate]
          properties:
            received:
              type: object
              additionalProperties:
                type: integer
            toInsert:
              type: object
              additionalProperties:
                type: integer
            toUpdate:
              type: object
              additionalProperties:
                type: integer
        diff:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              required: [key, operation]
              properties:
                key:
                  type: string
                operation:
                  type: string
                  enum: [insert, update]
        warnings:
          type: array
          items:
            type: string
        appliedAt:
          $ref: '#/components/schemas/DateTime'
        confirmationRequired:
          type: boolean
        confirmationToken:
          type: string
          nullable: true

    AdminDataSnapshot:
      type: object
      required: [version, exportedAt, data]
      properties:
        version:
          type: integer
        exportedAt:
          $ref: '#/components/schemas/DateTime'
        meta:
          type: object
          properties:
            schemaVersion:
              type: integer
            collections:
              type: object
              additionalProperties:
                type: object
                required: [count]
                properties:
                  count:
                    type: integer
        data:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true

    MultiplayerPlayerStatsByOption:
      type: object
      required: [overall, byOption]
      properties:
        overall:
          type: array
          items:
            $ref: '#/components/schemas/MultiplayerPlayerStats'
        byOption:
          type: array
          items:
            type: object
            required: [option, stats]
            properties:
              option:
                type: object
                required: [id, code, displayName]
                properties:
                  id:
                    $ref: '#/components/schemas/Uuid'
                  code:
                    type: string
                  displayName:
                    type: string
              stats:
                type: array
                items:
                  $ref: '#/components/schemas/MultiplayerPlayerStats'

    MultiplayerPodiumStats:
      type: object
      required: [playerId, name, wins, seconds, thirds, podiums]
      properties:
        playerId:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        wins:
          type: integer
        seconds:
          type: integer
        thirds:
          type: integer
        podiums:
          type: integer

    OneVsOnePlayerStats:
      type: object
      required: [playerId, name, matches, wins, pointsFor, pointsAgainst]
      properties:
        playerId:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        matches:
          type: integer
        wins:
          type: integer
        draws:
          type: integer
          nullable: true
        pointsFor:
          type: integer
        pointsAgainst:
          type: integer

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: "ok"

    Game:
      type: object
      required: [id, code, name, isActive]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        name:
          type: string
        isActive:
          type: boolean

    GameDeleteResponse:
      type: object
      required: [id, code, name, deletedMatches]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        code:
          type: string
        name:
          type: string
        deletedMatches:
          type: integer

    Player:
      type: object
      required: [id, name, isActive, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        isActive:
          type: boolean
        createdAt:
          $ref: '#/components/schemas/DateTime'

    PlayerDeleteResponse:
      type: object
      required:
        [
          player,
          deletedOneVsOneMatches,
          deletedMultiplayerParticipations,
          deletedOrphanMultiplayerMatches,
        ]
      properties:
        player:
          $ref: '#/components/schemas/Player'
        deletedOneVsOneMatches:
          type: integer
        deletedMultiplayerParticipations:
          type: integer
        deletedOrphanMultiplayerMatches:
          type: integer

    MatchSummary:
      type: object
      required: [id, playedOn, game, playerA, playerB, scoreA, scoreB, winner]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        game:
          $ref: '#/components/schemas/Game'
        playerA:
          type: object
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        playerB:
          type: object
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        scoreA:
          type: integer
        scoreB:
          type: integer
        winner:
          type: string
          enum: [A, B, DRAW]

    MatchDetail:
      allOf:
        - $ref: '#/components/schemas/MatchSummary'
        - type: object
          required: [notes, createdAt, updatedAt]
          properties:
            notes:
              type: string
              nullable: true
            createdAt:
              $ref: '#/components/schemas/DateTime'
            updatedAt:
              $ref: '#/components/schemas/DateTime'

    MatchListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MatchSummary'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    MatchCreate:
      type: object
      required: [gameId, playedOn, playerAId, playerBId, scoreA, scoreB]
      properties:
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        playerAId:
          $ref: '#/components/schemas/Uuid'
        playerBId:
          $ref: '#/components/schemas/Uuid'
        scoreA:
          type: integer
          minimum: 0
        scoreB:
          type: integer
          minimum: 0
        notes:
          type: string
          nullable: true
          maxLength: 2000

    MatchPatch:
      type: object
      properties:
        gameId:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        playerAId:
          $ref: '#/components/schemas/Uuid'
        playerBId:
          $ref: '#/components/schemas/Uuid'
        scoreA:
          type: integer
          minimum: 0
        scoreB:
          type: integer
          minimum: 0
        notes:
          type: string
          nullable: true
          maxLength: 2000

    PlayerCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60

    PlayerPatch:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        isActive:
          type: boolean

    HeadToHeadStats:
      type: object
      required: [player1, player2, matches, player1Wins, player2Wins, draws]
      properties:
        player1:
          type: object
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        player2:
          type: object
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        matches:
          type: integer
        player1Wins:
          type: integer
        player2Wins:
          type: integer
        draws:
          type: integer

    TicketToRideMatchPlayer:
      type: object
      required:
        [id, player, ticketsPoints, bonusPoints, trainsCounts, trainsPoints, totalPoints, place]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        player:
          type: object
          required: [id, name]
          properties:
            id:
              $ref: '#/components/schemas/Uuid'
            name:
              type: string
        ticketsPoints:
          type: integer
        bonusPoints:
          type: integer
        trainsCounts:
          $ref: '#/components/schemas/TrainsCounts'
        trainsPoints:
          type: integer
        totalPoints:
          type: integer
        place:
          type: integer

    TicketToRideMatch:
      type: object
      required: [id, playedOn, variant, players]
      properties:
        id:
          $ref: '#/components/schemas/Uuid'
        playedOn:
          $ref: '#/components/schemas/Date'
        variant:
          $ref: '#/components/schemas/TicketToRideVariant'
        notes:
          type: string
          nullable: true
        createdAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'
        players:
          type: array
          items:
            $ref: '#/components/schemas/TicketToRideMatchPlayer'

    TicketToRideMatchListResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketToRideMatch'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    TicketToRidePlayerStats:
      type: object
      required: [playerId, name, matches, wins, podiums, avgPoints, bestPoints]
      properties:
        playerId:
          $ref: '#/components/schemas/Uuid'
        name:
          type: string
        matches:
          type: integer
        wins:
          type: integer
        podiums:
          type: integer
        avgPoints:
          type: number
          format: float
        bestPoints:
          type: integer

    TicketToRideMatchCreate:
      type: object
      required: [playedOn, variantId, players]
      properties:
        playedOn:
          $ref: '#/components/schemas/Date'
        variantId:
          $ref: '#/components/schemas/Uuid'
        notes:
          type: string
          maxLength: 2000
          nullable: true
        players:
          type: array
          minItems: 2
          maxItems: 5
          items:
            type: object
            required: [playerId, ticketsPoints, bonusPoints, trainsCounts]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              ticketsPoints:
                type: integer
              bonusPoints:
                type: integer
                minimum: 0
              trainsCounts:
                $ref: '#/components/schemas/TrainsCounts'

    TicketToRideMatchPatch:
      type: object
      properties:
        playedOn:
          $ref: '#/components/schemas/Date'
        variantId:
          $ref: '#/components/schemas/Uuid'
        notes:
          type: string
          maxLength: 2000
          nullable: true
        players:
          type: array
          minItems: 2
          maxItems: 5
          items:
            type: object
            required: [playerId, ticketsPoints, bonusPoints, trainsCounts]
            properties:
              playerId:
                $ref: '#/components/schemas/Uuid'
              ticketsPoints:
                type: integer
              bonusPoints:
                type: integer
                minimum: 0
              trainsCounts:
                $ref: '#/components/schemas/TrainsCounts'

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequestsError:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /ready:
    get:
      summary: Readiness check with database and schema validation
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status:
                    type: string
                    enum: [ready]
                  checks:
                    type: object
                    additionalProperties: true
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                type: object
                required: [status, checks]
                properties:
                  status:
                    type: string
                    enum: [not_ready]
                  checks:
                    type: object
                    additionalProperties: true
                  error:
                    type: object
                    additionalProperties: true

  /games:
    get:
      summary: List 1v1 games
      parameters:
        - in: query
          name: includeInactive
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'

  /games/{id}:
    patch:
      summary: Update 1v1 game active flag
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Game'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      summary: Delete 1v1 game with related matches
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDeleteResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'

  /players:
    get:
      summary: List players
      parameters:
        - in: query
          name: active
          schema:
            type: boolean
            default: true
        - in: query
          name: q
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Player'
        '400':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      summary: Create player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Player'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '500':
          $ref: '#/components/responses/InternalError'

  /players/{id}:
    patch:
