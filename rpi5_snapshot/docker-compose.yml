services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamestats}
      POSTGRES_USER: ${POSTGRES_USER:-gamestats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamestats}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi; npm start"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DB_BOOTSTRAP: ${DB_BOOTSTRAP:-false}
      PORT: ${BACKEND_PORT:-3002}
      CORS_ORIGIN: "${CORS_ORIGIN:-https://stats.sh.info.pl}"
      DATABASE_URL: "${DATABASE_URL:-postgresql://${POSTGRES_USER:-gamestats}:${POSTGRES_PASSWORD:-gamestats}@postgres:5432/${POSTGRES_DB:-gamestats}}"
    ports:
      - "${BACKEND_PORT:-3002}:${BACKEND_PORT:-3002}" # na czas testów może zostać
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.gamestats-backend.entrypoints=web
      - traefik.http.routers.gamestats-backend.rule=Host(`stats.sh.info.pl`) && PathPrefix(`/api`)
      - traefik.http.services.gamestats-backend.loadbalancer.server.port=3002

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "if [ ! -d node_modules ]; then npm install; fi; npm run build && npm run preview -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    environment:
      PORT: ${FRONTEND_PORT:-5173}
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-https://stats.sh.info.pl}"
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_PORT:-5173}" # na czas testów może zostać
    depends_on:
      - backend
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.gamestats-frontend.entrypoints=web
      - traefik.http.routers.gamestats-frontend.rule=Host(`stats.sh.info.pl`)
      - traefik.docker.network=proxy
      - traefik.http.services.gamestats-frontend.loadbalancer.server.port=5173

volumes:
  db-data:

networks:
  proxy:
    external: true
